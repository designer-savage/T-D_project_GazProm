<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8A4FF"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1A1B35"/>
      <stop offset="100%" stop-color="#0D0E1A"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" stroke="#6C63FF" stroke-width="0.5" stroke-opacity="0.3" fill="none"/>
  <!-- Main 4-pointed sparkle star -->
  <path d="M16 5 L18.12 13.88 L27 16 L18.12 18.12 L16 27 L13.88 18.12 L5 16 L13.88 13.88 Z"
        fill="url(#starGrad)" filter="url(#glow)"/>
  <!-- Top-right accent dot -->
  <circle cx="23" cy="9" r="1.8" fill="#A8A4FF" opacity="0.75"/>
  <!-- Bottom-left accent dot -->
  <circle cx="9.5" cy="22.5" r="1.1" fill="#6C63FF" opacity="0.55"/>
</svg>
