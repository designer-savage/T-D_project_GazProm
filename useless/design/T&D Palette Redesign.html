<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>T&D — редизайн палитры</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --canvas:        #F2EEE4;
    --canvas-2:      #ECE7DA;
    --surface:       #FFFFFF;
    --surface-2:     #FBF8F1;
    --ink:           #1C1E22;
    --ink-2:         #2C2F36;
    --muted:         #6B6A63;
    --muted-2:       #93918A;
    --line:          #E2DCCB;
    --line-2:        #EFE9DA;

    --sidebar:       #1B1D24;
    --sidebar-2:     #262932;
    --sidebar-line:  #2E313B;
    --sidebar-text:  #C8C5BC;
    --sidebar-text-2:#8A877E;

    --accent:        #2A6F6A;
    --accent-2:      #225A56;
    --accent-soft:   #DCE9E6;
    --accent-ink:    #FFFFFF;

    --success:       #3F7A4F;
    --warn:          #B8762B;
    --danger:        #B24A3F;
    --danger-soft:   #F4E2DE;
  }

  html, body {
    margin: 0;
    background: var(--canvas);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  code, pre, .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }

  .doc {
    max-width: 1280px;
    margin: 0 auto;
    padding: 72px 56px 160px;
  }

  /* ---------- typography ---------- */
  .eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  h1 {
    font-size: 44px;
    line-height: 1.08;
    letter-spacing: -0.02em;
    font-weight: 600;
    margin: 14px 0 18px;
    text-wrap: balance;
  }
  h2 {
    font-size: 24px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    font-weight: 600;
    margin: 0;
  }
  h3 {
    font-size: 16px;
    line-height: 1.3;
    font-weight: 600;
    margin: 0;
  }
  p { margin: 0; }
  .lead {
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 720px;
    text-wrap: pretty;
  }

  .section {
    margin-top: 88px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: 18px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }
  .section-head .meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ---------- cover ---------- */
  .cover {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 56px;
    align-items: end;
  }
  .cover-meta {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .cover-meta-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    font-size: 13px;
  }
  .cover-meta-row .k {
    color: var(--muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .cover-meta-row .v { color: var(--ink); font-weight: 500; }

  /* ---------- palette swatches ---------- */
  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .swatch {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .swatch-chip {
    height: 96px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .swatch-chip[data-edge="true"]::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  .swatch-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .swatch-token {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
  }
  .swatch-hex {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .swatch-role {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ---------- code blocks ---------- */
  .code {
    background: #15171C;
    color: #DDD6C5;
    border-radius: 6px;
    padding: 22px 26px;
    overflow: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px;
    line-height: 1.65;
  }
  .code .c-key  { color: #9EC6BE; }
  .code .c-str  { color: #E2B978; }
  .code .c-com  { color: #6C6A5F; font-style: italic; }
  .code .c-pun  { color: #7C7A70; }
  .code .c-add  { color: #A9D6A6; }
  .code .c-del  { color: #D89084; }
  .code .c-tag  { color: #C8A6E0; }
  .code .c-attr { color: #E2B978; }

  /* ---------- diff blocks ---------- */
  .diff {
    background: #15171C;
    color: #C8C5BC;
    border-radius: 6px;
    overflow: hidden;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .diff-head {
    background: #1F2128;
    color: #93918A;
    padding: 10px 18px;
    border-bottom: 1px solid #2A2D34;
    font-size: 12px;
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
  }
  .diff-body {
    padding: 14px 0;
    overflow-x: auto;
  }
  .diff-line {
    display: block;
    padding: 0 18px 0 36px;
    position: relative;
    white-space: pre;
  }
  .diff-line.add { background: rgba(82, 132, 90, 0.12); color: #C5E0BD; }
  .diff-line.add::before { content: "+"; position: absolute; left: 16px; color: #7BAE7A; }
  .diff-line.del { background: rgba(178, 74, 63, 0.10); color: #D89084; }
  .diff-line.del::before { content: "−"; position: absolute; left: 16px; color: #C5786C; }
  .diff-line.ctx::before { content: " "; position: absolute; left: 16px; color: #4A4D54; }

  /* ---------- mapping table ---------- */
  .map-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    font-size: 13px;
  }
  .map-table th, .map-table td {
    text-align: left;
    padding: 12px 18px;
    vertical-align: top;
  }
  .map-table thead th {
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .map-table tbody tr + tr td {
    border-top: 1px solid var(--line-2);
  }
  .map-table td.where {
    font-weight: 500;
    color: var(--ink);
    width: 22%;
  }
  .map-table td.what {
    color: var(--muted);
    font-size: 12.5px;
    width: 26%;
  }
  .map-table td.from, .map-table td.to {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
  }
  .map-table td.from { color: var(--danger); }
  .map-table td.to   { color: var(--accent-2); }
  .map-table td.arrow { color: var(--muted-2); width: 24px; text-align: center; }

  /* ---------- mockup ---------- */
  .mockup-shell {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 12px 32px -20px rgba(28,30,34,0.18);
  }
  .mockup-caption {
    padding: 14px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    color: var(--muted);
  }
  .mockup-caption strong { color: var(--ink); font-weight: 600; }

  .mock {
    --m-canvas:   var(--canvas);
    --m-canvas-2: var(--canvas-2);
    --m-surface:  var(--surface);
    --m-surface-2:var(--surface-2);
    --m-ink:      var(--ink);
    --m-muted:    var(--muted);
    --m-muted-2:  var(--muted-2);
    --m-line:     var(--line);
    --m-line-2:   var(--line-2);
    --m-sidebar:  var(--sidebar);
    --m-sidebar-2:var(--sidebar-2);
    --m-sidebar-text: var(--sidebar-text);
    --m-sidebar-text-2: var(--sidebar-text-2);
    --m-accent:   var(--accent);
    --m-accent-2: var(--accent-2);
    --m-accent-soft: var(--accent-soft);
    --m-accent-ink:  var(--accent-ink);
    --m-success:  var(--success);
    --m-warn:     var(--warn);
    --m-danger:   var(--danger);
    --m-danger-soft: var(--danger-soft);

    display: grid;
    grid-template-columns: 220px 1fr;
    height: 520px;
    background: var(--m-canvas);
    color: var(--m-ink);
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 13px;
  }
  .mock-sidebar {
    background: var(--m-sidebar);
    color: var(--m-sidebar-text);
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-right: 1px solid var(--m-sidebar);
  }
  .mock-brand {
    padding: 6px 8px 22px;
    border-bottom: 1px solid var(--m-sidebar-2);
    margin-bottom: 14px;
  }
  .mock-brand .name {
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .mock-brand .sub {
    color: var(--m-sidebar-text-2);
    font-size: 11.5px;
    margin-top: 3px;
  }
  .mock-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .mock-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    border-radius: 5px;
    color: var(--m-sidebar-text);
    font-size: 13px;
  }
  .mock-nav-item .ico {
    width: 14px; height: 14px;
    color: var(--m-sidebar-text-2);
    flex-shrink: 0;
  }
  .mock-nav-item.active {
    background: var(--m-accent);
    color: #fff;
  }
  .mock-nav-item.active .ico { color: #fff; }

  .mock-main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .mock-header {
    padding: 16px 22px;
    background: var(--m-canvas);
    border-bottom: 1px solid var(--m-line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mock-header .title { font-size: 14px; font-weight: 500; }
  .mock-header .user {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .mock-header .user .who { text-align: right; }
  .mock-header .user .name { font-weight: 600; color: var(--m-ink); }
  .mock-header .user .role { color: var(--m-muted); font-size: 11px; }
  .mock-header .user .avatar {
    width: 28px; height: 28px;
    background: var(--m-accent);
    color: var(--m-accent-ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }

  .mock-body {
    flex: 1;
    overflow: hidden;
    padding: 22px;
    background: var(--m-canvas);
  }

  /* chat mockup */
  .mock-chat {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100%;
  }
  .bubble {
    max-width: 70%;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.45;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--m-accent);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .bubble.assistant {
    align-self: flex-start;
    background: var(--m-surface);
    border: 1px solid var(--m-line);
    color: var(--m-ink);
    border-bottom-left-radius: 3px;
  }
  .mock-input {
    margin-top: auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .mock-input input {
    flex: 1;
    background: var(--m-surface);
    border: 1px solid var(--m-line);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--m-ink);
    font-family: inherit;
  }
  .mock-input button {
    background: var(--m-accent);
    color: #fff;
    border: 0;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
  }

  /* career mockup */
  .mock-card {
    background: var(--m-surface);
    border: 1px solid var(--m-line);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .career-grades {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    align-items: center;
    margin-top: 16px;
    position: relative;
  }
  .career-grades::before {
    content: "";
    position: absolute;
    left: 12%;
    right: 12%;
    top: 14px;
    height: 1px;
    background: var(--m-line);
  }
  .grade {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }
  .grade-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--m-surface);
    border: 1.5px solid var(--m-line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--m-muted);
  }
  .grade.done .grade-dot {
    background: var(--m-accent-soft);
    border-color: var(--m-accent);
    color: var(--m-accent-2);
  }
  .grade.current .grade-dot {
    background: var(--m-accent);
    border-color: var(--m-accent);
    color: #fff;
  }
  .grade-label {
    font-size: 11.5px;
    color: var(--m-muted);
  }
  .grade.current .grade-label { color: var(--m-accent-2); font-weight: 500; }

  .kpis {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 14px;
  }
  .kpi-num {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .kpi-label { font-size: 11.5px; color: var(--m-muted); margin-top: 2px; }

  .gap-row {
    margin-top: 10px;
  }
  .gap-bar {
    height: 5px;
    background: var(--m-line-2);
    border-radius: 99px;
    overflow: hidden;
    margin-top: 6px;
  }
  .gap-bar > span {
    display: block;
    height: 100%;
    background: var(--m-warn);
    border-radius: 99px;
  }

  /* dashboard mockup */
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .stat-card { padding: 14px 16px; }
  .stat-card.alert {
    background: var(--m-danger-soft);
    border-color: rgba(178,74,63,0.18);
  }
  .stat-card .num {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .stat-card .num.accent { color: var(--m-accent-2); }
  .stat-card .num.danger { color: var(--m-danger); }
  .stat-card .lbl { font-size: 11.5px; color: var(--m-muted); margin-top: 2px; }

  .team-table {
    margin-top: 14px;
  }
  .team-row {
    display: grid;
    grid-template-columns: 1.4fr 0.8fr 0.8fr 1fr 0.8fr;
    align-items: center;
    padding: 9px 14px;
    font-size: 12.5px;
    border-bottom: 1px solid var(--m-line-2);
  }
  .team-row.head {
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--m-muted);
    border-bottom: 1px solid var(--m-line);
    background: var(--m-surface-2);
  }
  .team-row.risk {
    background: var(--m-danger-soft);
  }
  .team-progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .team-bar {
    flex: 1;
    height: 4px;
    background: var(--m-line-2);
    border-radius: 99px;
    overflow: hidden;
  }
  .team-bar > span {
    display: block;
    height: 100%;
    background: var(--m-success);
    border-radius: 99px;
  }
  .team-bar.warn > span { background: var(--m-warn); }
  .risk-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--m-danger);
    font-size: 12px;
    font-weight: 500;
  }

  /* ---------- principles ---------- */
  .principles {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .principle {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px 22px 24px;
  }
  .principle .n {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .principle h3 { margin-top: 8px; }
  .principle p { color: var(--muted); font-size: 13.5px; margin-top: 8px; line-height: 1.55; }

  /* ---------- file index ---------- */
  .file-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .file-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px 20px;
  }
  .file-card h3 {
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .file-card p { color: var(--muted); font-size: 12.5px; }

  hr.rule {
    border: 0;
    border-top: 1px solid var(--line);
    margin: 0;
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

/* ============================================================
   PALETTE PRESETS
   ============================================================ */
const PRESETS = {
  paper: {
    label: "Тёплая бумага + Teal",

    vars: {
      "--canvas":        "#F2EEE4",
      "--canvas-2":      "#ECE7DA",
      "--surface":       "#FFFFFF",
      "--surface-2":     "#FBF8F1",
      "--ink":           "#1C1E22",
      "--ink-2":         "#2C2F36",
      "--muted":         "#6B6A63",
      "--muted-2":       "#93918A",
      "--line":          "#E2DCCB",
      "--line-2":        "#EFE9DA",
      "--sidebar":       "#1B1D24",
      "--sidebar-2":     "#262932",
      "--sidebar-text":  "#C8C5BC",
      "--sidebar-text-2":"#8A877E",
      "--accent":        "#2A6F6A",
      "--accent-2":      "#225A56",
      "--accent-soft":   "#DCE9E6",
      "--accent-ink":    "#FFFFFF",
      "--success":       "#3F7A4F",
      "--warn":          "#B8762B",
      "--danger":        "#B24A3F",
      "--danger-soft":   "#F4E2DE",
    },
    tokens: paperTokens(),
    name: "paper",
  },
  slate: {
    label: "Холодный сланец + Indigo",
    note: "Slate-нейтрали, благородный indigo-акцент. Сдержанный и более «техничный» вариант.",
    vars: {
      "--canvas":        "#EEF1F5",

/* ============================================================
   TAILWIND CONFIG SNIPPET
   ============================================================ */
function TailwindConfig({ preset }) {
  const t = preset.tokens;
  const lines = [];
  const push = (s) => lines.push(s);
  push(<span><span className="c-com">// tailwind.config.ts — theme.extend.colors</span><br/></span>);
  push(<span><span className="c-key">colors</span>: {"{"}<br/></span>);
  Object.entries(t).forEach(([group, vals]) => {
    push(<span>{"  "}<span className="c-key">{group}</span>: {"{"}<br/></span>);
    Object.entries(vals).forEach(([k, v]) => {
      const key = /^\d/.test(k) || k === "DEFAULT" ? k : `"${k}"`;
      push(<span>{"    "}{key === "DEFAULT" ? <span className="c-key">DEFAULT</span> : <span className="c-key">{key}</span>}: <span className="c-str">"{v}"</span>,<br/></span>);
    });
    push(<span>{"  "}{"},"}<br/></span>);
  });
  push(<span>{"}"}<br/></span>);
  return (
    <pre className="code"><code>{lines.map((l, i) => <React.Fragment key={i}>{l}</React.Fragment>)}</code></pre>
  );
}
